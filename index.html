    <script>
        // Kredensial Firebase Proyek Toko-Sin Baru Anda
        const firebaseConfig = {
          apiKey: "AIzaSyAKbysCa5tOgnN4fr99YKBkAmcLwzOgn4Q",
          authDomain: "toko-sin.firebaseapp.com",
          databaseURL: "https://toko-sin-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "toko-sin",
          storageBucket: "toko-sin.firebasestorage.app",
          messagingSenderId: "730575620129",
          appId: "1:730575620129:web:ebf4af972453b979f57b60",
          measurementId: "G-B1QDPW5C2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function tokoSinApp() {
            return {
                page: 'home',
                search: '',
                selectedCategory: 'Semua',
                detailModal: false,
                adminModal: false,
                cartOpen: false,
                activeProduct: null,
                editMode: false,
                
                currentVarianName: 'bungkus',
                currentVarianHarga: 0,

                categories: ['Sin Kretek', 'Sin Filter', 'Sin Cerutu'],
                products: [],
                cart: [],
                
                form: { nama: '', kategori: 'Sin Kretek', stok: 'Tersedia', detail: '', foto: '', listVarian: [{namaVarian: 'bungkus', harga: ''}] },

                init() {
                    db.ref('produk').on('value', (snap) => {
                        const val = snap.val();
                        this.products = val ? Object.keys(val).map(k => ({ firebaseId: k, ...val[k] })) : [];
                    });
                },

                addFormVarian() {
                    this.form.listVarian.push({ namaVarian: '', harga: '' });
                },

                removeFormVarian(index) {
                    this.form.listVarian.splice(index, 1);
                },

                getActiveVarianList() {
                    if (this.activeProduct && this.activeProduct.listVarian && this.activeProduct.listVarian.length > 0) {
                        return this.activeProduct.listVarian;
                    }
                    if (this.activeProduct) {
                        return [{ namaVarian: 'bungkus', harga: this.activeProduct.harga || 0 }];
                    }
                    return [];
                },

                selectVarian(varianObj) {
                    this.currentVarianName = varianObj.namaVarian;
                    this.currentVarianHarga = varianObj.harga;
                },

                addActiveToCart() {
                    if(this.activeProduct.stok === 'Habis') return alert("Stok sedang kosong!");
                    
                    const itemKey = this.activeProduct.firebaseId + '-' + this.currentVarianName;
                    const exist = this.cart.find(item => item.cartId === itemKey);
                    
                    if(exist) {
                        exist.qty++;
                    } else {
                        this.cart.push({
                            ...this.activeProduct,
                            cartId: itemKey,
                            varian: this.currentVarianName,
                            hargaTerpilih: this.currentVarianHarga,
                            qty: 1
                        });
                    }
                    alert("Berhasil masuk keranjang belanja!");
                },

                removeFromCart(index) {
                    this.cart.splice(index, 1);
                },

                get cartTotal() {
                    return this.cart.reduce((total, item) => total + (item.hargaTerpilih * item.qty), 0);
                },

                checkoutWhatsApp() {
                    if(this.cart.length === 0) return alert("Keranjang masih kosong");
                    let pesan = "Halo Toko Sin, saya ingin memesan produk herbal berikut:\n\n";
                    this.cart.forEach(item => {
                        pesan += `- ${item.nama} [Varian: ${item.varian.toUpperCase()}] (${item.qty}x) = ${this.formatRupiah(item.hargaTerpilih * item.qty)}\n`;
                    });
                    pesan += `\nTotal Keseluruhan: ${this.formatRupiah(this.cartTotal)}`;
                    window.open(`https://wa.me/6285397419715?text=${encodeURIComponent(pesan)}`);
                },

                loginAdmin() {
                    let password = prompt("Masukkan Kata Sandi Admin Toko Sin:");
                    if (password === "rokoherbal") {
                        this.adminModal = true;
                    } else if (password !== null) {
                        alert("Kata sandi salah!");
                    }
                },

                saveProduct() {
                    if (!this.form.nama) return alert("Nama produk wajib diisi!");
                    if (!this.form.listVarian || this.form.listVarian.length === 0 || !this.form.listVarian[0].harga) {
                        return alert("Minimal isi 1 Varian Utama beserta Harganya!");
                    }
                    
                    const fileInput = document.getElementById('admFile');
                    const upload = (img) => {
                        if (img) this.form.foto = img;
                        if (this.editMode) {
                            db.ref('produk/' + this.form.firebaseId).update(this.form);
                        } else {
                            db.ref('produk').push(this.form);
                        }
                        this.closeAdminPanel();
                        alert("Berhasil disimpan!");
                    };

                    if (fileInput && fileInput.files[0]) {
                        const reader = new FileReader();
                        reader.onload = (e) => upload(e.target.result);
                        reader.readAsDataURL(fileInput.files[0]);
                    } else {
                        upload(this.form.foto);
                    }
                },

                editProduct(p) {
                    this.editMode = true;
                    let parsedVarian = p.listVarian ? [...p.listVarian] : [{ namaVarian: 'bungkus', harga: p.harga || '' }];
                    
                    this.form = { 
                        nama: p.nama || '',
                        kategori: p.kategori || 'Sin Kretek',
                        stok: p.stok || 'Tersedia',
                        detail: p.detail || '',
                        foto: p.foto || '',
                        listVarian: parsedVarian,
                        firebaseId: p.firebaseId
                    };
                    document.querySelector('[x-show="adminModal"] .overflow-y-auto').scrollTo({ top: 0, behavior: 'smooth' });
                },

                deleteProduct(fId) {
                    if (confirm('Hapus produk Sin ini?')) db.ref('produk/' + fId).remove();
                },

                closeAdminPanel() { this.adminModal = false; this.resetForm(); },
                resetForm() {
                    this.form = { nama: '', kategori: 'Sin Kretek', stok: 'Tersedia', detail: '', foto: '', listVarian: [{namaVarian: 'bungkus', harga: ''}] };
                    this.editMode = false;
                    if(document.getElementById('admFile')) document.getElementById('admFile').value = "";
                },

                get filteredProducts() {
                    return this.products.filter(p => {
                        const matchSearch = p.nama.toLowerCase().includes(this.search.toLowerCase());
                        const matchCat = this.selectedCategory === 'Semua' || p.kategori === this.selectedCategory;
                        return matchSearch && matchCat;
                    });
                },

                filterCategory(cat) { this.selectedCategory = cat; this.page = 'produk'; },
                
                openDetail(p) { 
                    this.activeProduct = p;
                    let vList = this.getActiveVarianList();
                    if(vList.length > 0) {
                        this.currentVarianName = vList[0].namaVarian;
                        this.currentVarianHarga = vList[0].harga;
                    }
                    this.detailModal = true; 
                },
                formatRupiah(num) { return 'Rp ' + (num ? parseInt(num).toLocaleString('id-ID') : '0'); }
            }
        }
    </script>
</body>
</html>
